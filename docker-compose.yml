version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bharatai-postgres
    environment:
      POSTGRES_USER: bharatai
      POSTGRES_PASSWORD: bharatai_dev
      POSTGRES_DB: bharatai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bharatai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bharatai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: bharatai-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: bharatai-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres
    environment:
      - VITE_API_BASE=http://backend:8000

volumes:
  pgdata:
  redisdata:
  chromadata:
